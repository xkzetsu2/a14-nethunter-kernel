name: Build NetHunter Kernel

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq bc bison flex libssl-dev libelf-dev python3 \
            gcc-aarch64-linux-gnu clang-14 lld-14 llvm-14 mold lz4 brotli
          sudo ln -sf /usr/bin/clang-14 /usr/local/bin/clang
          sudo ln -sf /usr/bin/clang++-14 /usr/local/bin/clang++
          sudo ln -sf /usr/bin/llvm-ar-14 /usr/local/bin/llvm-ar
          sudo ln -sf /usr/bin/ld.lld-14 /usr/local/bin/ld.lld
          sudo ln -sf /usr/bin/llvm-nm-14 /usr/local/bin/llvm-nm
          sudo ln -sf /usr/bin/llvm-objcopy-14 /usr/local/bin/llvm-objcopy
          sudo ln -sf /usr/bin/llvm-objdump-14 /usr/local/bin/llvm-objdump
          sudo ln -sf /usr/bin/llvm-strip-14 /usr/local/bin/llvm-strip

      - name: Create NetHunter defconfig
        run: |
          cat arch/arm64/configs/a14noavbp_defconfig > arch/arm64/configs/exynos850-nethunter_defconfig
          echo "CONFIG_WLAN_VENDOR_ATH=y" >> arch/arm64/configs/exynos850-nethunter_defconfig
          echo "CONFIG_WLAN_VENDOR_REALTEK=y" >> arch/arm64/configs/exynos850-nethunter_defconfig
          echo "CONFIG_WLAN_VENDOR_MEDIATEK=y" >> arch/arm64/configs/exynos850-nethunter_defconfig
          echo "CONFIG_MT7601U=m" >> arch/arm64/configs/exynos850-nethunter_defconfig
          echo "CONFIG_RTL8XXXU=m" >> arch/arm64/configs/exynos850-nethunter_defconfig
          echo "CONFIG_RTL8XXXU_UNTESTED=y" >> arch/arm64/configs/exynos850-nethunter_defconfig
          echo "CONFIG_ATH9K_HTC=m" >> arch/arm64/configs/exynos850-nethunter_defconfig
          echo "CONFIG_CARL9170=m" >> arch/arm64/configs/exynos850-nethunter_defconfig
          echo "CONFIG_USB_G_HID=m" >> arch/arm64/configs/exynos850-nethunter_defconfig
          echo "CONFIG_BT_HIDP=m" >> arch/arm64/configs/exynos850-nethunter_defconfig
          echo "CONFIG_MAC80211_MESH=y" >> arch/arm64/configs/exynos850-nethunter_defconfig

      - name: Configure kernel
        run: |
          # No mrproper needed for in-tree build
          make ARCH=arm64 LLVM=1 CC=clang CROSS_COMPILE=aarch64-linux-gnu- \
            exynos850-nethunter_defconfig
          scripts/config --file .config --disable KASAN
          scripts/config --file .config --disable KASAN_INLINE
          scripts/config --file .config --disable PCIEAER
          scripts/config --file .config --disable DEBUG_INFO_BTF
          scripts/config --file .config --disable CFI_CLANG
          scripts/config --file .config --disable CFI_CLANG_SHADOW
          # Keep SHADOW_CALL_STACK - it's fine without CFI
          sed -i 's/-Werror=strict-prototypes/-Wno-error=strict-prototypes/g' Makefile
          sed -i 's/-Werror=implicit-function-declaration/-Wno-error=implicit-function-declaration/g' Makefile
          sed -i 's/-Werror=implicit-int/-Wno-error=implicit-int/g' Makefile
          sed -i 's/-Werror=return-type/-Wno-error=return-type/g' Makefile
          echo 'KBUILD_CFLAGS += -Wno-error' >> Makefile
          echo 'KBUILD_CFLAGS += -Wno-int-conversion' >> Makefile

      - name: Build kernel (dtbs first, then kernel, then modules)
        run: |
          BUILD_ARGS="LOCALVERSION=-nethunter-a14-$(git rev-parse --short HEAD) KBUILD_BUILD_USER=opencode KBUILD_BUILD_HOST=ci"
          make -j$(nproc) ARCH=arm64 LLVM=1 CC=clang CROSS_COMPILE=aarch64-linux-gnu- \
            LDFLAGS="-fuse-ld=mold" $BUILD_ARGS dtbs
          make -j$(nproc) ARCH=arm64 LLVM=1 CC=clang CROSS_COMPILE=aarch64-linux-gnu- \
            LDFLAGS="-fuse-ld=mold" $BUILD_ARGS
          make -j$(nproc) ARCH=arm64 LLVM=1 CC=clang CROSS_COMPILE=aarch64-linux-gnu- \
            LDFLAGS="-fuse-ld=mold" INSTALL_MOD_STRIP="--strip-debug --keep-section=.ARM.attributes" \
            INSTALL_MOD_PATH=modules_out $BUILD_ARGS modules_install

      - name: Prepare artifacts
        run: |
          mkdir -p output
          cp arch/arm64/boot/Image output/
          find . -path ./modules_out -prune -o -name "*.ko" -print -exec cp {} output/ \;
          cp -r modules_out/lib/modules/* output/ 2>/dev/null || true
          ls -lh output/

      - name: Upload full artifacts (kernel + modules)
        uses: actions/upload-artifact@v4
        with:
          name: nethunter-kernel-a14-full
          path: output/

      - name: Upload kernel image only
        uses: actions/upload-artifact@v4
        with:
          name: nethunter-kernel-a14-image
          path: output/Image
