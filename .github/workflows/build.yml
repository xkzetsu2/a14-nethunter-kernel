name: Build NetHunter Kernel

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup system tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq bc bison flex libssl-dev libelf-dev python3 \
            gcc-aarch64-linux-gnu mold lz4 brotli cpio xz-utils
          # Ensure mold is on PATH
          which mold

      - name: Download AOSP clang prebuilt
        run: |
          set -e
          CLANG_DEST="/tmp/aosp-clang"
          mkdir -p "$CLANG_DEST"

          # Clone the AOSP clang repo with sparse checkout (fast, ~10 files initially)
          # Then fetch just the latest clang version directory
          echo "Cloning AOSP clang repo (sparse)..."
          git clone --depth 1 --filter=blob:none --sparse \
            "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86" \
            /tmp/aosp-clang-repo 2>&1

          cd /tmp/aosp-clang-repo
          # Find latest clang-r* directory (exclude clang-stable, clang-* numeric ones)
          CLANG_DIR=$(git ls-tree --name-only HEAD | grep '^clang-r' | sort -V | tail -1)
          echo "Latest clang version: $CLANG_DIR"

          # Sparse checkout just that directory
          git sparse-checkout set "$CLANG_DIR" 2>&1
          git checkout 2>&1

          # Move to final location
          mv "$CLANG_DIR"/* "$CLANG_DEST/" 2>/dev/null || true
          cd /
          rm -rf /tmp/aosp-clang-repo

          echo "=== Final clang location ==="
          ls -la "$CLANG_DEST/bin/clang" 2>/dev/null || echo "clang not found!"
          ls "$CLANG_DEST/bin/aarch64-linux-gnu-*" 2>/dev/null || echo "(no aarch64 binutils)"

      - name: Verify toolchain
        run: |
          CLANG_DIR="/tmp/aosp-clang"
          if [ ! -f "$CLANG_DIR/bin/clang" ]; then
            echo "ERROR: clang not downloaded!"
            ls -la "$CLANG_DIR/bin/" 2>/dev/null || echo "bin dir empty"
            exit 1
          fi
          echo "=== CLANG ==="
          $CLANG_DIR/bin/clang --version 2>&1 | head -3
          echo "=== CFI check ==="
          echo 'int main(){}' | $CLANG_DIR/bin/clang -fsanitize=cfi -c -x c - -o /dev/null 2>&1 && \
            echo "CFI: supported" || echo "CFI: NOT supported"
          echo "=== Tools ==="
          ls $CLANG_DIR/bin/llvm-* 2>/dev/null | head -5
          ls $CLANG_DIR/bin/aarch64-linux-gnu-* 2>/dev/null | head -5 || echo "(no aarch64 binutils)"

      - name: Create NetHunter defconfig
        run: |
          cat arch/arm64/configs/a14noavbp_defconfig > arch/arm64/configs/exynos850-nethunter_defconfig
          echo "CONFIG_WLAN_VENDOR_ATH=y" >> arch/arm64/configs/exynos850-nethunter_defconfig
          echo "CONFIG_WLAN_VENDOR_REALTEK=y" >> arch/arm64/configs/exynos850-nethunter_defconfig
          echo "CONFIG_WLAN_VENDOR_MEDIATEK=y" >> arch/arm64/configs/exynos850-nethunter_defconfig
          echo "CONFIG_MT7601U=m" >> arch/arm64/configs/exynos850-nethunter_defconfig
          echo "CONFIG_RTL8XXXU=m" >> arch/arm64/configs/exynos850-nethunter_defconfig
          echo "CONFIG_RTL8XXXU_UNTESTED=y" >> arch/arm64/configs/exynos850-nethunter_defconfig
          echo "CONFIG_ATH9K_HTC=m" >> arch/arm64/configs/exynos850-nethunter_defconfig
          echo "CONFIG_CARL9170=m" >> arch/arm64/configs/exynos850-nethunter_defconfig
          echo "CONFIG_USB_G_HID=m" >> arch/arm64/configs/exynos850-nethunter_defconfig
          echo "CONFIG_BT_HIDP=m" >> arch/arm64/configs/exynos850-nethunter_defconfig
          echo "CONFIG_MAC80211_MESH=y" >> arch/arm64/configs/exynos850-nethunter_defconfig

      - name: Build kernel
        run: |
          CLANG_DIR="/tmp/aosp-clang"

          # Setup - same as buildnoavbp.sh
          export CC="${CLANG_DIR}/bin/clang"
          export PATH="${CLANG_DIR}/bin:$PATH"
          export LLVM=1
          export ARCH=arm64

          # CROSS_COMPILE: prefer aarch64-linux-gnu- from clang dir, else system
          if [ -f "${CLANG_DIR}/bin/aarch64-linux-gnu-objdump" ]; then
            export CROSS_COMPILE="${CLANG_DIR}/bin/aarch64-linux-gnu-"
          else
            export CROSS_COMPILE="aarch64-linux-gnu-"
          fi
          export LD="mold"
          export LLVM_LDFLAGS="-fuse-ld=mold"
          export DTC_FLAGS="-@"

          MOD_VER=$(git rev-parse --short HEAD)
          BUILD_ARGS="LOCALVERSION=-nethunter-a14-${MOD_VER} KBUILD_BUILD_USER=opencode KBUILD_BUILD_HOST=ci O=out"

          # Configure
          make -C . O=out ARCH=arm64 LLVM=1 CC=clang \
            CROSS_COMPILE=${CROSS_COMPILE} \
            exynos850-nethunter_defconfig

          # Check if CFI symbols exist in this clang version
          if echo 'int main(){}' | ${CC} -fsanitize=cfi -c -x c - -o /dev/null 2>&1; then
            echo "CFI SUPPORTED - keeping enabled"
          else
            echo "CFI NOT SUPPORTED - disabling"
            scripts/config --file .config --disable CFI_CLANG
            scripts/config --file .config --disable CFI_CLANG_SHADOW
          fi

          # Build kernel (dtbs + Image + modules) - same as langsdorff
          make -j$(nproc) -C . O=out ARCH=arm64 LLVM=1 CC=clang \
            CROSS_COMPILE=${CROSS_COMPILE} \
            LDFLAGS="-fuse-ld=mold" \
            ${BUILD_ARGS}

          # Also build modules
          make -j$(nproc) -C . O=out ARCH=arm64 LLVM=1 CC=clang \
            CROSS_COMPILE=${CROSS_COMPILE} \
            LDFLAGS="-fuse-ld=mold" \
            INSTALL_MOD_STRIP="--strip-debug --keep-section=.ARM.attributes" \
            INSTALL_MOD_PATH=$(pwd)/modules_out \
            ${BUILD_ARGS} modules_install

          echo "=== Build complete ==="
          ls -lh out/arch/arm64/boot/Image

      - name: Create boot.img
        run: |
          python3 kernel_build/mkbootimg/mkbootimg.py \
            --header_version 4 \
            --kernel out/arch/arm64/boot/Image \
            --output boot.img \
            --os_version 14.0.0 \
            --os_patch_level 2025-04
          ls -lh boot.img

      - name: Upload boot.img
        uses: actions/upload-artifact@v4
        with:
          name: boot-nethunter
          path: boot.img

      - name: Prepare full artifacts
        run: |
          mkdir -p output
          cp out/arch/arm64/boot/Image output/
          find . -path ./modules_out -prune -o -name "*.ko" -print -exec cp {} output/ \;
          cp -r modules_out/lib/modules/* output/ 2>/dev/null || true
          ls -lh output/

      - name: Upload full artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nethunter-kernel-a14-full
          path: output/
