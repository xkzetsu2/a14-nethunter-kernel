name: Build NetHunter Kernel

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq bc bison flex libssl-dev libelf-dev python3 gcc-aarch64-linux-gnu clang llvm lld

      - name: Create NetHunter defconfig
        run: |
          cat arch/arm64/configs/exynos850-a14nsxx_defconfig > arch/arm64/configs/exynos850-nethunter_defconfig
          # Enable vendor WiFi drivers first (before module options)
          echo "CONFIG_WLAN_VENDOR_ATH=y" >> arch/arm64/configs/exynos850-nethunter_defconfig
          echo "CONFIG_WLAN_VENDOR_REALTEK=y" >> arch/arm64/configs/exynos850-nethunter_defconfig
          echo "CONFIG_WLAN_VENDOR_MEDIATEK=y" >> arch/arm64/configs/exynos850-nethunter_defconfig
          echo "CONFIG_MT7601U=m" >> arch/arm64/configs/exynos850-nethunter_defconfig
          echo "CONFIG_RTL8XXXU=m" >> arch/arm64/configs/exynos850-nethunter_defconfig
          echo "CONFIG_RTL8XXXU_UNTESTED=y" >> arch/arm64/configs/exynos850-nethunter_defconfig
          echo "CONFIG_ATH9K_HTC=m" >> arch/arm64/configs/exynos850-nethunter_defconfig
          echo "CONFIG_CARL9170=m" >> arch/arm64/configs/exynos850-nethunter_defconfig
          echo "CONFIG_USB_G_HID=m" >> arch/arm64/configs/exynos850-nethunter_defconfig
          echo "CONFIG_NETFILTER_XT_MATCH_IPRANGE=y" >> arch/arm64/configs/exynos850-nethunter_defconfig
          echo "CONFIG_BT_HIDP=m" >> arch/arm64/configs/exynos850-nethunter_defconfig
          echo "CONFIG_MAC80211_MESH=y" >> arch/arm64/configs/exynos850-nethunter_defconfig

      - name: Configure kernel
        run: |
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- LLVM=1 exynos850-nethunter_defconfig
          scripts/config --file .config --disable LTO_NONE
          scripts/config --file .config --disable LTO_CLANG
          scripts/config --file .config --disable THINLTO
          scripts/config --file .config --disable LTO
          scripts/config --file .config --disable KASAN
          scripts/config --file .config --disable KASAN_INLINE
          scripts/config --file .config --disable KASAN_STACK
          scripts/config --file .config --disable DEBUG_INFO_BTF
          scripts/config --file .config --disable PCIEAER
          # Fix Werror in Makefile (Samsung vendor code breaks with -Werror)
          sed -i 's/-Werror=strict-prototypes/-Wno-error=strict-prototypes/g' Makefile
          sed -i 's/-Werror=implicit-function-declaration/-Wno-error=implicit-function-declaration/g' Makefile
          sed -i 's/-Werror=implicit-int/-Wno-error=implicit-int/g' Makefile
          sed -i 's/-Werror=return-type/-Wno-error=return-type/g' Makefile
          sed -i 's/-Werror=date-time/-Wno-error=date-time/g' Makefile
          sed -i 's/-Werror=incompatible-pointer-types/-Wno-error=incompatible-pointer-types/g' Makefile
          sed -i 's/-Werror=designated-init/-Wno-error=designated-init/g' Makefile
          # Force disable all -Werror at the end of Makefile
          echo 'KBUILD_CFLAGS += -Wno-error' >> Makefile
          echo 'KBUILD_CFLAGS += -Wno-int-conversion' >> Makefile

      - name: Build kernel
        run: |
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- LLVM=1 -j$(nproc)

      - name: Prepare artifacts
        run: |
          mkdir -p output
          cp arch/arm64/boot/Image output/
          find . -path ./output -prune -o -name "*.ko" -print -exec cp {} output/ \;
          cat arch/arm64/boot/Image | gzip > output/Image.gz
          ls -lh output/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nethunter-kernel-a14
          path: output/
