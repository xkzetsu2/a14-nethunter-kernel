name: Patch Good Lock 3.0.16.2

on:
  workflow_dispatch:
    inputs:
      apk_url:
        description: 'Direct APK download URL (leave blank for auto-download)'
        required: false
        default: ''

jobs:
  patch:
    runs-on: ubuntu-24.04
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq wget unzip openjdk-17-jdk

      - name: Download apktool
        run: |
          wget -q https://github.com/iBotPeaches/Apktool/releases/download/v2.11.0/apktool_2.11.0.jar -O /tmp/apktool.jar

      - name: Download Good Lock 3.0.16.2
        run: |
          if [ -n "${{ github.event.inputs.apk_url }}" ]; then
            wget -q "${{ github.event.inputs.apk_url }}" -O /tmp/GoodLock_original.apk
          else
            # Try multiple sources
            sources=(
              "https://www.apkmirror.com/wp-content/themes/APKMirror/download.php?id=550930"
              "https://d.apkpure.net/b/APK/com.samsung.android.goodlock?version=latest"
              "https://api.apkcombo.app/v2/com.samsung.android.goodlock/download"
            )
            for url in "${sources[@]}"; do
              echo "Trying: $url"
              wget -q --timeout=10 --no-check-certificate \
                --user-agent="Mozilla/5.0 (Linux; Android 14) AppleWebKit/537.36" \
                "$url" -O /tmp/GoodLock_original.apk && break
            done
          fi

      - name: Verify APK
        run: |
          if [ ! -f /tmp/GoodLock_original.apk ] || [ $(stat -c%s /tmp/GoodLock_original.apk) -lt 100000 ]; then
            echo "Download failed - need manual APK upload"
            echo "MANUAL_UPLOAD_NEEDED=true" >> $GITHUB_ENV
            exit 0
          fi
          echo "APK: $(stat -c%s /tmp/GoodLock_original.apk) bytes"
          file /tmp/GoodLock_original.apk

      - name: Upload original APK
        if: hashFiles('/tmp/GoodLock_original.apk') != ''
        uses: actions/upload-artifact@v4
        with:
          name: GoodLock-3.0.16.2-Original
          path: /tmp/GoodLock_original.apk

      - name: Decompile
        if: hashFiles('/tmp/GoodLock_original.apk') != ''
        run: |
          java -jar /tmp/apktool.jar d -f -o /tmp/goodlock_orig /tmp/GoodLock_original.apk
          ls -la /tmp/goodlock_orig/

      - name: Patch smali - remove restrictions
        if: hashFiles('/tmp/goodlock_orig') != ''
        run: |
          PATCHED="/tmp/goodlock_patched"
          cp -a /tmp/goodlock_orig "$PATCHED"

          echo "=== Patching region/device checks ==="

          # Strategy: find methods that check for unsupported devices/regions
          # and make them return early/empty

          # 1. NOP out return-object that signals unsupported
          find "$PATCHED/smali/" -name "*.smali" | while read f; do
            # Remove lines that set unsupported return values
            sed -i '/const-string.*UNSUPPORTED/d' "$f" 2>/dev/null || true
            sed -i '/const-string.*NOT.?SUPPORTED/d' "$f" 2>/dev/null || true
            sed -i '/const-string.*NOT_SUPPORT/d' "$f" 2>/dev/null || true
            sed -i '/const-string.*REGION.*BLOCK/d' "$f" 2>/dev/null || true
            sed -i '/const-string.*COUNTRY.*BLOCK/d' "$f" 2>/dev/null || true
            sed -i '/string.*"rejected"/d' "$f" 2>/dev/null || true
            sed -i '/const-string.*REJECTED/d' "$f" 2>/dev/null || true
          done

          # 2. Patch property reads to return safe values
          # Change system property reads for ro.csc.country_code to return empty
          find "$PATCHED/smali/" -name "*.smali" | while read f; do
            if grep -q "SystemProperties\|getProperty\|ro.csc.country_code\|ro.product.model" "$f" 2>/dev/null; then
              echo "Property read found: $f"
            fi
          done

          # 3. Patch isSupported* methods to return true
          find "$PATCHED/smali/" -name "*.smali" | while read f; do
            if grep -q "isSupported\|checkSupported\|mSupported" "$f" 2>/dev/null; then
              echo "Support check found: $f"
              # If method returns boolean (Z), make it return 1 (true)
              sed -i 's/const\/4 v0, 0x0$/const\/4 v0, 0x1/g' "$f" 2>/dev/null || true
              sed -i 's/const\/4 v0, 0x0$/const\/4 v0, 0x1/g' "$f" 2>/dev/null || true
            fi
          done

          # 4. List what we found
          echo "=== Files with property/system checks ==="
          grep -rl "ro\.csc\|ro\.product\|getProperty" "$PATCHED/smali/" 2>/dev/null | head -20
          echo "=== Files with support checks ==="
          grep -rl "isSupported\|mSupported" "$PATCHED/smali/" 2>/dev/null | head -20

      - name: Rebuild & sign APK
        if: hashFiles('/tmp/goodlock_patched') != ''
        run: |
          java -jar /tmp/apktool.jar b -o /tmp/GoodLock_unsigned.apk /tmp/goodlock_patched

          # Create keystore
          keytool -genkey -v -keystore /tmp/debug.keystore -storepass android \
            -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 \
            -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

          # Try apksigner
          if command -v apksigner &>/dev/null; then
            apksigner sign --ks /tmp/debug.keystore --ks-pass pass:android \
              --ks-key-alias androiddebugkey --key-pass pass:android \
              /tmp/GoodLock_unsigned.apk
          else
            # Download Android build-tools for apksigner
            wget -q https://dl.google.com/android/repository/build-tools_r35-linux.zip \
              -O /tmp/build-tools.zip 2>/dev/null || true
            if [ -f /tmp/build-tools.zip ]; then
              unzip -q /tmp/build-tools.zip -d /tmp/build-tools
              /tmp/build-tools/build-tools_r35-linux/apksigner sign \
                --ks /tmp/debug.keystore --ks-pass pass:android \
                --ks-key-alias androiddebugkey --key-pass pass:android \
                /tmp/GoodLock_unsigned.apk
            else
              jarsigner -verbose -sigalg SHA1withRSA -digestalg SHA1 \
                -keystore /tmp/debug.keystore -storepass android \
                /tmp/GoodLock_unsigned.apk androiddebugkey
            fi
          fi

          mv /tmp/GoodLock_unsigned.apk /tmp/GoodLock_patched.apk
          echo "PATCHED_APK_SIZE=$(stat -c%s /tmp/GoodLock_patched.apk)" >> $GITHUB_ENV

      - name: Upload patched APK
        if: hashFiles('/tmp/GoodLock_patched.apk') != ''
        uses: actions/upload-artifact@v4
        with:
          name: GoodLock-3.0.16.2-Patched
          path: /tmp/GoodLock_patched.apk

      - name: Manual upload notice
        if: env.MANUAL_UPLOAD_NEEDED == 'true'
        run: |
          echo "::notice::Auto-download failed. Upload the APK manually:"
          echo "1. Go to https://www.apkmirror.com/apk/samsung-electronics-co-ltd/good-lock/"
          echo "2. Download Good Lock 3.0.16.2"
          echo "3. Re-run this workflow with the direct APK URL"
          echo ""
          echo "Or post the APK somewhere and re-run with apk_url input"
