name: Automated Securities Disabled Kernel Build

on:
  workflow_dispatch:
  push:
    branches:
      - dev

jobs:
  Enforcing:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Install tools
      run: |
        sudo apt-get install python2 pahole libelf-dev -y
        DIR="$(readlink -f .)"
        PARENT_DIR="$(readlink -f "${DIR}/..")"
        git clone https://gitlab.com/tejas101k/clang-r450784d.git/ "$PARENT_DIR/clang-r450784d" --depth=1
    - uses: rui314/setup-mold@v1
    - name: Build
      run: |
        bash buildnoavb.sh
    - name: Upload
      uses: actions/upload-artifact@v7
      with:
        name: Enforcing-NoSecurities
        path: kernel_build/langsdorff*
  Permissive:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Install tools
      run: |
        sudo apt-get install python2 pahole libelf-dev -y
        DIR="$(readlink -f .)"
        PARENT_DIR="$(readlink -f "${DIR}/..")"
        git clone https://gitlab.com/tejas101k/clang-r450784d.git/ "$PARENT_DIR/clang-r450784d" --depth=1
    - uses: rui314/setup-mold@v1  
    - name: Build
      run: |
        bash buildnoavbp.sh
    - name: Upload
      uses: actions/upload-artifact@v7
      with:
        name: Permissive-NoSecurities
        path: kernel_build/langsdorff*
